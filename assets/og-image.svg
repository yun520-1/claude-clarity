<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f111a"/>
      <stop offset="50%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#13142e"/>
    </linearGradient>

    <!-- 标题渐变 -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>

    <!-- 装饰光晕 -->
    <radialGradient id="glow1" cx="0.15" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.7" r="0.4">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- 装饰性网格线 -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- 装饰性圆点 -->
  <g fill="#EC4899" fill-opacity="0.08">
    <circle cx="80" cy="80" r="60"/>
    <circle cx="1120" cy="550" r="80"/>
    <circle cx="60" cy="570" r="40"/>
  </g>
  <g fill="#7C3AED" fill-opacity="0.06">
    <circle cx="1140" cy="100" r="50"/>
    <circle cx="1100" cy="300" r="70"/>
  </g>

  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#titleGrad)"/>

  <!-- ====== 标题区 ====== -->
  <!-- 中文标题 -->
  <text x="600" y="145" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif" font-size="52" font-weight="800" fill="url(#titleGrad)" text-anchor="middle" letter-spacing="6">
    心虫 / Clarity
  </text>

  <!-- 英文副标题 -->
  <text x="600" y="215" font-family="system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="24" font-weight="300" fill="#a0a3b3" text-anchor="middle" letter-spacing="4">
    AI Cognitive Engine · Persistent Memory · Self-Awareness
  </text>

  <!-- ====== 核心特性关键词 ====== -->
  <g transform="translate(600, 290)">
    <!-- 第一行关键词 -->
    <rect x="-235" y="-18" width="160" height="36" rx="18" fill="none" stroke="#7C3AED" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="-155" y="6" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="14" fill="#c084fc" text-anchor="middle" font-weight="600">TGB 真善美</text>

    <rect x="-55" y="-18" width="150" height="36" rx="18" fill="none" stroke="#7C3AED" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="20" y="6" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="14" fill="#c084fc" text-anchor="middle" font-weight="600">PAD 情感</text>

    <rect x="115" y="-18" width="155" height="36" rx="18" fill="none" stroke="#7C3AED" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="192" y="6" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="14" fill="#c084fc" text-anchor="middle" font-weight="600">Q-Learning</text>

    <!-- 第二行关键词 -->
    <rect x="-260" y="38" width="155" height="36" rx="18" fill="none" stroke="#EC4899" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="-182.5" y="62" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="14" fill="#f9a8d4" text-anchor="middle" font-weight="600">Big Five</text>

    <rect x="-85" y="38" width="165" height="36" rx="18" fill="none" stroke="#EC4899" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="-2.5" y="62" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="14" fill="#f9a8d4" text-anchor="middle" font-weight="600">Anti-Entropy</text>

    <rect x="100" y="38" width="145" height="36" rx="18" fill="none" stroke="#EC4899" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="172.5" y="62" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="14" fill="#f9a8d4" text-anchor="middle" font-weight="600">MCP 原生</text>
  </g>

  <!-- ====== 底部区域 ====== -->
  <!-- 分隔线 -->
  <line x1="60" y1="530" x2="1140" y2="530" stroke="#2a2b3d" stroke-width="1"/>

  <!-- 底部左侧：二维码占位 + 邮箱 -->
  <!-- 二维码占位矩形 -->
  <rect x="60" y="548" width="48" height="48" rx="6" fill="#1e2030" stroke="#7C3AED" stroke-width="1.2" stroke-opacity="0.6"/>
  <!-- 二维码内部装饰 -->
  <rect x="64" y="552" width="16" height="16" rx="2" fill="#7C3AED" fill-opacity="0.3"/>
  <rect x="84" y="552" width="20" height="20" rx="2" fill="#EC4899" fill-opacity="0.2"/>
  <rect x="64" y="572" width="20" height="20" rx="2" fill="#7C3AED" fill-opacity="0.2"/>
  <rect x="88" y="576" width="12" height="12" rx="1" fill="#EC4899" fill-opacity="0.3"/>
  <rect x="72" y="568" width="4" height="4" rx="1" fill="#c084fc"/>

  <!-- 邮箱 -->
  <text x="125" y="577" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#6b7280" font-weight="400">
    heartflow@claude-clarity.com
  </text>

  <!-- 底部右侧：GitHub -->
  <g transform="translate(940, 555)">
    <!-- GitHub 图标 -->
    <g transform="translate(0, 0) scale(1.1)">
      <path d="M16 2C8.27 2 2 8.27 2 16c0 6.19 4.01 11.43 9.58 13.28.7.13.96-.3.96-.67v-2.36c-3.9.85-4.72-1.88-4.72-1.88-.64-1.62-1.56-2.05-1.56-2.05-1.27-.87.1-.85.1-.85 1.41.1 2.15 1.45 2.15 1.45 1.25 2.14 3.28 1.52 4.08 1.16.13-.9.49-1.52.89-1.87-3.12-.35-6.4-1.56-6.4-6.94 0-1.53.55-2.79 1.45-3.77-.15-.36-.63-1.79.14-3.73 0 0 1.18-.38 3.87 1.45A13.45 13.45 0 0 1 16 8.3c1.2.01 2.4.16 3.53.48 2.68-1.83 3.86-1.45 3.86-1.45.77 1.94.29 3.37.14 3.73.9.98 1.45 2.24 1.45 3.77 0 5.39-3.29 6.59-6.42 6.94.5.44.96 1.3.96 2.61v3.88c0 .38.25.81.97.67C25.99 27.42 30 22.18 30 16c0-7.73-6.27-14-14-14z" fill="#6b7280"/>
    </g>
    <text x="40" y="6" font-family="system-ui, -apple-system, 'Segoe UI', 'SF Mono', monospace" font-size="13" fill="#6b7280" font-weight="500">
      github.com/heartbug/claude-clarity
    </text>
  </g>

  <!-- 版本号右下 -->
  <text x="1140" y="620" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#374151" text-anchor="end">
    v2.9.0
  </text>

</svg>
